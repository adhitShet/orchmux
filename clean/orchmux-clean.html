<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>orchmux</title>
<style>
  html,body,#root{margin:0;padding:0;height:100%;overflow:hidden}
  body{background:#fffdf5;font-family:-apple-system,BlinkMacSystemFont,"Inter",sans-serif}
  @keyframes nClean{0%,100%{opacity:1}50%{opacity:0.3}}
  @keyframes nBlink{0%,100%{opacity:1}50%{opacity:0}}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="/clean/shared.jsx?v=24"></script>
<script type="text/babel" src="/clean/v3-split.jsx?v=24"></script>
<script type="text/babel" src="/clean/mobile.jsx?v=24"></script>

<script>
// Purge stale Babel localStorage cache on each load
try { Object.keys(localStorage).filter(k=>k.startsWith('babel-')).forEach(k=>localStorage.removeItem(k)); } catch(e) {}
</script>
<script type="text/babel">
function App() {
  const [isMobile, setIsMobile] = React.useState(window.innerWidth < 768);
  React.useEffect(() => {
    const h = () => setIsMobile(window.innerWidth < 768);
    window.addEventListener('resize', h);
    return () => window.removeEventListener('resize', h);
  }, []);
  return isMobile ? <CleanMobileSplit/> : <CleanSplit/>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
